services:
  minio:
    image: minio/minio:latest
    container_name: livekit-poc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: livekit-poc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/livekit-poc-recordings &&
      echo 'bucket ready';
      "

  redis:
    image: redis:7-alpine
    container_name: livekit-poc-redis
    ports:
      - "6379:6379"  # host network の egress コンテナから参照させるため
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-poc-livekit
    command: --config /etc/livekit.yaml --bind 0.0.0.0
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"      # signaling (WebSocket)
      - "7881:7881"      # WebRTC TCP fallback
      - "7882:7882/udp"  # WebRTC UDP (ICE-Lite)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  egress:
    image: livekit/egress:latest
    container_name: livekit-poc-egress
    # host network に載せて、Mac のブラウザと同じ「localhost 経由」の経路で livekit/minio に届かせる。
    # これで node_ip: 127.0.0.1 が egress 側でも有効になる。
    network_mode: host
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: devkey
        api_secret: livekit_local_devsecret_abc123xyz789
        ws_url: ws://localhost:7880
        redis:
          address: localhost:6379
        log_level: info
    cap_add:
      - SYS_ADMIN
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  minio-data:

