<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470" font-family="'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif">
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#5a5a5a"/>
    </marker>
    <marker id="arrB" markerWidth="13" markerHeight="13" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4.5 L0,9 Z" fill="#d79b00"/>
    </marker>
  </defs>
  <rect width="960" height="470" fill="#ffffff"/>
  <text x="32" y="40" font-size="20" font-weight="700" fill="#1f2937">なぜ「リアルタイム層」が要るのか — HTTP(pull) と push の違い</text>

  <!-- divider -->
  <line x1="32" y1="232" x2="928" y2="232" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ===== PULL LANE ===== -->
  <text x="32" y="86" font-size="14" font-weight="700" fill="#9ca3af">REST + ポーリング（不十分）</text>

  <g>
    <rect x="60" y="104" width="190" height="62" rx="9" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.6"/>
    <text x="155" y="140" text-anchor="middle" font-size="13.5" fill="#1f2937">あなたのブラウザ</text>
  </g>
  <g>
    <rect x="430" y="104" width="170" height="62" rx="9" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.6"/>
    <text x="515" y="140" text-anchor="middle" font-size="13.5" fill="#1f2937">サーバー / API</text>
  </g>
  <g>
    <rect x="760" y="104" width="150" height="62" rx="9" fill="#D5E8D4" stroke="#82B366" stroke-width="1.6"/>
    <text x="835" y="140" text-anchor="middle" font-size="13.5" fill="#1f2937">DB</text>
  </g>
  <line x1="250" y1="135" x2="426" y2="135" stroke="#5a5a5a" stroke-width="1.7" marker-end="url(#arr)"/>
  <rect x="270" y="112" width="142" height="18" rx="3" fill="#ffffff"/>
  <text x="341" y="125" text-anchor="middle" font-size="11.5" fill="#6b7280">①数秒おきに GET</text>
  <line x1="600" y1="135" x2="756" y2="135" stroke="#5a5a5a" stroke-width="1.7" marker-end="url(#arr)"/>
  <text x="678" y="128" text-anchor="middle" font-size="11.5" fill="#6b7280">SELECT</text>
  <text x="60" y="200" font-size="12.5" fill="#b85450">✗ ポーリング間隔ぶんの遅延・空振りリクエストの無駄・スケール非効率 → 実査チャットの即時性に不足</text>

  <!-- ===== PUSH LANE ===== -->
  <text x="32" y="270" font-size="14" font-weight="700" fill="#d79b00">リアルタイム層（push）</text>

  <g>
    <rect x="60" y="288" width="190" height="62" rx="9" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.6"/>
    <text x="155" y="324" text-anchor="middle" font-size="13.5" fill="#1f2937">送信元（他の参加者）</text>
  </g>
  <g>
    <rect x="400" y="288" width="230" height="62" rx="9" fill="#FFE6CC" stroke="#D79B00" stroke-width="1.8"/>
    <text x="515" y="316" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f2937">リアルタイム層</text>
    <text x="515" y="335" text-anchor="middle" font-size="11.5" fill="#6b5b3e">WebSocket 常時接続</text>
  </g>
  <g>
    <rect x="780" y="288" width="150" height="62" rx="9" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.6"/>
    <text x="855" y="324" text-anchor="middle" font-size="13.5" fill="#1f2937">あなたのブラウザ</text>
  </g>
  <g>
    <rect x="400" y="384" width="230" height="48" rx="9" fill="#D5E8D4" stroke="#82B366" stroke-width="1.6"/>
    <text x="515" y="413" text-anchor="middle" font-size="13" fill="#1f2937">DB（記録・履歴）</text>
  </g>
  <line x1="250" y1="319" x2="396" y2="319" stroke="#5a5a5a" stroke-width="1.7" marker-end="url(#arr)"/>
  <text x="323" y="312" text-anchor="middle" font-size="11.5" fill="#6b7280">送信</text>
  <line x1="630" y1="319" x2="776" y2="319" stroke="#d79b00" stroke-width="2.4" marker-end="url(#arrB)"/>
  <rect x="648" y="296" width="116" height="18" rx="3" fill="#ffffff"/>
  <text x="706" y="309" text-anchor="middle" font-size="11.5" font-weight="700" fill="#d79b00">②即時 push</text>
  <line x1="515" y1="350" x2="515" y2="380" stroke="#5a5a5a" stroke-width="1.7" marker-end="url(#arr)"/>
  <text x="548" y="370" text-anchor="middle" font-size="11.5" fill="#6b7280">保存</text>
  <text x="660" y="404" font-size="12.5" fill="#2f855a">✓ 届いた瞬間に受信。</text>
  <text x="660" y="423" font-size="12.5" fill="#374151">配信＝realtime 層／記録＝DB（役割が別）</text>
</svg>
