<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="640" viewBox="0 0 1000 640" font-family="'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif">
  <defs>
    <marker id="d" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,4 L0,8 Z" fill="#5a5a5a"/></marker>
  </defs>
  <rect width="1000" height="640" fill="#ffffff"/>
  <text x="32" y="40" font-size="20" font-weight="700" fill="#1f2937">チャット リアルタイム層 — 決定ツリー</text>
  <text x="32" y="64" font-size="12.5" fill="#6b7280">Q1〜Q3 に答えると採用案が決まる。★＝現制約（DB＝RDS・複雑さ回避・AV 分離）での既定路線。</text>

  <!-- Start -->
  <rect x="398" y="86" width="204" height="50" rx="9" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.8"/>
  <text x="500" y="116" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f2937">チャット配信層を決める</text>

  <!-- Q1 diamond -->
  <polygon points="500,150 640,212 500,274 360,212" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.8"/>
  <text x="500" y="208" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Q1．DB＝RDS は</text>
  <text x="500" y="226" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">確定制約か？</text>

  <!-- Q2 diamond (left) -->
  <polygon points="250,300 372,356 250,412 128,356" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.8"/>
  <text x="250" y="352" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">Q2．24/7 常駐</text>
  <text x="250" y="370" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">コンテナを許容？</text>

  <!-- Q3 diamond (right) -->
  <polygon points="745,300 885,356 745,412 605,356" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.8"/>
  <text x="745" y="346" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">Q3．最速・最小運用</text>
  <text x="745" y="363" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">を最優先＆データを</text>
  <text x="745" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">Supabase に置ける？</text>

  <!-- Terminals -->
  <rect x="64" y="500" width="190" height="74" rx="10" fill="#FFE6CC" stroke="#D79B00" stroke-width="3"/>
  <text x="159" y="530" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1f2937">案E ★</text>
  <text x="159" y="549" text-anchor="middle" font-size="11" fill="#6b5b3e">Fargate + Socket.IO</text>
  <text x="159" y="565" text-anchor="middle" font-size="10" fill="#9a7b3e">現制約での既定路線</text>

  <rect x="300" y="500" width="180" height="74" rx="10" fill="#FFE6CC" stroke="#D79B00" stroke-width="1.6"/>
  <text x="390" y="533" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f2937">案D</text>
  <text x="390" y="552" text-anchor="middle" font-size="11" fill="#6b5b3e">API GW WebSocket</text>

  <rect x="600" y="500" width="180" height="74" rx="10" fill="#E1D5E7" stroke="#9673A6" stroke-width="1.6"/>
  <text x="690" y="533" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f2937">案B</text>
  <text x="690" y="552" text-anchor="middle" font-size="11" fill="#6b5b7e">Supabase</text>

  <rect x="812" y="500" width="156" height="74" rx="10" fill="#F5F5F5" stroke="#999999" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="890" y="530" text-anchor="middle" font-size="11.5" fill="#374151">RDS 前提に戻る</text>
  <text x="890" y="548" text-anchor="middle" font-size="10.5" fill="#6b7280">（案E / 案D へ）</text>

  <!-- edges -->
  <line x1="500" y1="136" x2="500" y2="148" stroke="#5a5a5a" stroke-width="1.7" marker-end="url(#d)"/>
  <!-- Q1 -> Q2 (yes) -->
  <path d="M 360,212 L 250,212 L 250,298" fill="none" stroke="#5a5a5a" stroke-width="1.7" marker-end="url(#d)"/>
  <rect x="196" y="194" width="150" height="18" rx="3" fill="#ffffff"/>
  <text x="271" y="207" text-anchor="middle" font-size="11" font-weight="600" fill="#2f855a">はい：RDS は固定</text>
  <!-- Q1 -> Q3 (no) -->
  <path d="M 640,212 L 745,212 L 745,298" fill="none" stroke="#5a5a5a" stroke-width="1.7" marker-end="url(#d)"/>
  <rect x="666" y="194" width="158" height="18" rx="3" fill="#ffffff"/>
  <text x="745" y="207" text-anchor="middle" font-size="11" font-weight="600" fill="#b85450">いいえ：見直し可</text>
  <!-- Q2 -> 案E (yes) -->
  <path d="M 195,388 L 159,440 L 159,498" fill="none" stroke="#d79b00" stroke-width="2.2" marker-end="url(#d)"/>
  <rect x="92" y="430" width="138" height="18" rx="3" fill="#ffffff"/>
  <text x="161" y="443" text-anchor="middle" font-size="11" font-weight="700" fill="#d79b00">はい：常駐OK ★</text>
  <!-- Q2 -> 案D (no) -->
  <path d="M 305,388 L 390,440 L 390,498" fill="none" stroke="#5a5a5a" stroke-width="1.7" marker-end="url(#d)"/>
  <rect x="330" y="430" width="140" height="18" rx="3" fill="#ffffff"/>
  <text x="400" y="443" text-anchor="middle" font-size="11" fill="#6b7280">いいえ：SLS 必須</text>
  <!-- Q3 -> 案B (yes) -->
  <path d="M 700,390 L 690,440 L 690,498" fill="none" stroke="#5a5a5a" stroke-width="1.7" marker-end="url(#d)"/>
  <rect x="655" y="432" width="70" height="18" rx="3" fill="#ffffff"/>
  <text x="690" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#2f855a">はい</text>
  <!-- Q3 -> note (no) -->
  <path d="M 800,380 L 890,440 L 890,498" fill="none" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#d)"/>
  <rect x="848" y="432" width="86" height="18" rx="3" fill="#ffffff"/>
  <text x="891" y="445" text-anchor="middle" font-size="11" fill="#b85450">いいえ</text>

  <text x="32" y="612" font-size="11.5" fill="#6b7280">補足：AV からの独立を捨ててよい場合のみ「案A（LiveKit データチャネル再利用）」も選択肢。常駐を避けたい強い理由が無ければ案D より案Eが扱いやすい。</text>
</svg>
